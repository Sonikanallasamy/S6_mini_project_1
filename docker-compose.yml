# Local development only — HF Spaces ignores this file

services:
  backend:
    build: ./backend
    container_name: fake_medicine_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - easyocr_models:/app/models
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build: ./frontend
    container_name: fake_medicine_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  easyocr_models: